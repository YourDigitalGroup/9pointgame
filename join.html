<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <meta name="theme-color" content="#0b1e36" />
  <title>Join a Round — 9 Point Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:wght@500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="index.html">
        <span class="brand-name">9 Point Game</span>
      </a>
      <a class="btn btn-crimson btn-sm" href="new.html">Start</a>
    </div>
    <div class="header-rule"></div>
  </header>

  <main>
    <section class="section wrap">
      <p class="eyebrow">Join a Round</p>
      <h1 class="page-title">Enter the round code</h1>
      <p class="page-sub">
        Your scorekeeper will have this from setup. You'll join as a live
        viewer — no score entry needed.
      </p>

      <form class="join-form" id="join-form">
        <input
          type="text"
          id="code-input"
          class="code-input"
          placeholder="GLF-482"
          autocomplete="off"
          autocapitalize="characters"
          spellcheck="false"
          inputmode="text"
          maxlength="10"
        />
        <button type="submit" class="btn btn-crimson btn-block">Join</button>
      </form>

      <p class="form-error" id="join-error" hidden></p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p class="footer-text">
        An independent scoring app for the 3-man/9-point, 4-man/12-point, and
        5-man/15-point games. Not affiliated with the USGA.
      </p>
    </div>
  </footer>

  <script src="js/join.js" defer></script>
</body>
</html>
